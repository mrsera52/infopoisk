<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ query }} — SportSearch</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            min-height: 100vh;
        }
        .top-bar {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            gap: 14px;
        }
        .top-bar .brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a73e8;
            text-decoration: none;
            white-space: nowrap;
        }
        .top-bar form {
            flex: 1;
            display: flex;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
            max-width: 560px;
            background: #fff;
        }
        .top-bar input[type="text"] {
            flex: 1;
            padding: 8px 14px;
            font-size: 15px;
            border: none;
            outline: none;
        }
        .top-bar button {
            padding: 8px 18px;
            background: #1a73e8;
            border: none;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        .top-bar button:hover { background: #1558b0; }
        .meta {
            padding: 10px 20px;
            color: #888;
            font-size: 13px;
        }
        .results {
            padding: 0 20px 40px;
            max-width: 720px;
        }
        .item { margin-bottom: 18px; }
        .item-title a {
            font-size: 16px;
            color: #1a0dab;
            text-decoration: none;
        }
        .item-title a:hover { text-decoration: underline; }
        .item-url {
            font-size: 13px;
            color: #006621;
            margin-top: 2px;
            word-break: break-all;
        }
        .pager { padding: 10px 20px 40px; }
        .pager a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
        }
        .pager a:hover { text-decoration: underline; }
        .err { color: #d93025; padding: 20px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a class="brand" href="/">SportSearch</a>
        <form action="/search" method="get">
            <input type="text" name="q" value="{{ query }}" placeholder="Search...">
            <button type="submit">Go</button>
        </form>
    </div>

    {% if error %}
        <p class="err">{{ error }}</p>
    {% else %}
        <div class="meta">
            Found {{ total }} results ({{ elapsed }}s)
        </div>

        <div class="results">
            {% for r in results %}
            <div class="item">
                <div class="item-title">
                    <a href="{{ r.url }}" target="_blank" rel="noopener">{{ r.title }}</a>
                </div>
                <div class="item-url">{{ r.url }}</div>
            </div>
            {% endfor %}
        </div>

        {% if next_page %}
        <div class="pager">
            <a href="/search?q={{ query }}&page={{ next_page }}">Next page &rarr;</a>
        </div>
        {% endif %}
    {% endif %}
</body>
</html>
